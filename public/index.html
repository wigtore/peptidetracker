<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peptide Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap');
*{box-sizing:border-box}
body{font-family:'IBM Plex Sans',system-ui,sans-serif;background:#F3F5F2;color:#1C2B2D;margin:0;padding:20px 14px 60px}
#app{max-width:760px;margin:0 auto}
button{cursor:pointer;font-family:inherit}
button:focus-visible,input:focus-visible,select:focus-visible{outline:2px solid #177E89;outline-offset:2px}
.profile-bar{display:flex;gap:8px;margin-bottom:16px}
.profile-tab{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:10px 12px;border-radius:12px;border:1.5px solid #C9D2CF;background:#FFF;color:#4A5A5C;font-size:15px;font-weight:600;font-family:'Space Grotesk',sans-serif;transition:background .15s,color .15s}
.profile-tab.on{color:#FFF}
.avatar{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#FFF}
header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:18px}
.eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;font-weight:600}
h1{font-family:'Space Grotesk',sans-serif;font-size:26px;margin:2px 0 0;font-weight:700}
.sync-chip{font-size:12px;color:#5C6B6D;min-height:16px;text-align:right}
.sync-chip .dot-ind{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}
.tabs{display:flex;gap:4px;margin-bottom:18px;background:#E6EAE6;padding:4px;border-radius:10px}
.tabs button{flex:1;padding:9px 4px;border:none;border-radius:8px;background:transparent;font-size:13px;font-weight:500;color:#4A5A5C}
.tabs button.on{background:#FFF;color:#1C2B2D;font-weight:600;box-shadow:0 1px 2px rgba(28,43,45,.08)}
.week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.week-nav .label{font-family:'Space Grotesk',sans-serif;font-weight:600}
.nav-btn{width:36px;height:36px;border-radius:10px;border:1px solid #C9D2CF;background:#FFF;font-size:20px;line-height:1;color:#1C2B2D}
.ghost{border:none;background:transparent;font-size:13px;font-weight:600;padding:4px 8px;text-decoration:underline;text-underline-offset:3px}
.center{text-align:center;margin-bottom:14px}
.card{background:#FFF;border:1px solid #DDE4E1;border-radius:14px;padding:14px 16px;margin-bottom:14px}
.card-label{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#5C6B6D;font-weight:600;margin-bottom:10px}
.banner{background:#FFF8EC;border:1px solid #E8D5AE;border-radius:14px;padding:14px 16px;margin-bottom:14px;font-size:14px}
.grid-wrap{background:#FFF;border:1px solid #DDE4E1;border-radius:14px;overflow:hidden;margin-bottom:14px}
.grid-row{display:grid;grid-template-columns:minmax(110px,1.6fr) repeat(7,1fr);border-top:1px solid #EDF1EF;align-items:center}
.grid-row.head{border-top:none;background:#F8FAF8}
.day-head{text-align:center;padding:10px 2px;font-size:12px;font-weight:600;color:#4A5A5C}
.day-head.today{background:#EEF2F0;border-radius:8px}
.day-head .num{font-size:11px;opacity:.7}
.pep-cell{display:flex;gap:8px;align-items:center;padding:12px 10px}
.pep-cell .name{font-weight:600;font-size:14px}
.pep-cell .sub{font-size:12px;color:#5C6B6D}
.dose-cell{display:flex;justify-content:center;padding:10px 0}
.cap{width:30px;height:30px;border-radius:50%;border:2px solid #B9C4C4;background:#FFF;color:transparent;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:background .15s,border-color .15s}
.off-day{color:#C9D2CF;font-size:18px}
.dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;flex-shrink:0;vertical-align:baseline}
.row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-top:1px solid #F0F3F1;font-size:14px}
.mono{font-family:'IBM Plex Mono',monospace;font-size:14px}
.form-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
input,select{padding:9px 10px;border-radius:9px;border:1px solid #C9D2CF;font-size:14px;font-family:inherit;background:#FFF;color:#1C2B2D}
.primary{color:#FFF;border:none;border-radius:9px;padding:9px 16px;font-size:14px;font-weight:600}
.primary:disabled{opacity:.5;cursor:not-allowed}
.delete{border:none;background:transparent;color:#B0602F;font-size:14px;font-weight:700;padding:4px}
.day-pill{padding:7px 12px;border-radius:999px;border:1px solid #C9D2CF;background:#FFF;font-size:13px;font-weight:500;color:#4A5A5C}
.day-pill.on{color:#FFF;font-weight:600}
.stats{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.stat{flex:1 1 140px;background:#FFF;border:1px solid #DDE4E1;border-radius:14px;padding:12px 14px}
.stat .lbl{font-size:12px;color:#5C6B6D;text-transform:uppercase;letter-spacing:.06em}
.stat .val{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:600}
.empty{background:#FFF;border:1px dashed #C9D2CF;border-radius:14px;padding:28px 16px;text-align:center;color:#4A5A5C;display:flex;flex-direction:column;gap:12px;align-items:center;margin-bottom:14px}
.hint{font-size:12px;color:#5C6B6D;margin-top:6px}
.chart-svg{width:100%;height:auto;display:block}
.footer-tools{display:flex;gap:8px;justify-content:center;margin-top:24px;flex-wrap:wrap}
.calc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.calc-field label{display:block;font-size:12px;color:#5C6B6D;margin-bottom:4px;font-weight:600}
.calc-field input,.calc-field select{width:100%}
.calc-result{background:#F8FAF8;border:1px solid #DDE4E1;border-radius:12px;padding:12px 14px;margin-top:6px}
.calc-result .big{font-family:'IBM Plex Mono',monospace;font-size:24px;font-weight:600}
.calc-result .sub2{font-size:13px;color:#5C6B6D;margin-top:2px}
.formula{font-family:'IBM Plex Mono',monospace;font-size:12.5px;background:#F1F4F2;border-radius:8px;padding:10px 12px;line-height:1.7;overflow-x:auto}
@media (max-width:520px){.calc-grid{grid-template-columns:1fr}}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div id="app"></div>
<script>
/* ============ Peptide Tracker v2 — synced via Netlify Blobs ============ */
const KEY='peptide-tracker-v1';
const CODE_KEY='pt-household-code';
const API='/api/data';
const DAYS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const UNITS=['mg','mcg','IU','units'];
const PEP_COLORS=['#177E89','#B0602F','#5B6C9E','#6E8B4E','#8A5A83','#A3803C'];
const PROFILES=[{id:'victor',label:'Victor',accent:'#177E89'},{id:'jen',label:'Jen',accent:'#8A5A83'}];

const emptyProfile=()=>({peptides:[],logs:{},weights:[],calc:{vialMg:'',bacMl:'',dose:'',doseUnit:'mcg'}});
const emptyState=()=>({active:'victor',updatedAt:0,profiles:{victor:emptyProfile(),jen:emptyProfile()}});

function normalize(raw){
  if(!raw)return emptyState();
  if(raw.profiles&&raw.active){
    PROFILES.forEach(p=>{
      if(!raw.profiles[p.id])raw.profiles[p.id]=emptyProfile();
      if(!raw.profiles[p.id].calc)raw.profiles[p.id].calc={vialMg:'',bacMl:'',dose:'',doseUnit:'mcg'};
    });
    if(!raw.updatedAt)raw.updatedAt=0;
    return raw;
  }
  if(raw.peptides||raw.logs||raw.weights){
    const s=emptyState();
    s.profiles.victor={...emptyProfile(),peptides:raw.peptides||[],logs:raw.logs||{},weights:raw.weights||[]};
    return s;
  }
  return emptyState();
}

function loadLocal(){
  try{return normalize(JSON.parse(localStorage.getItem(KEY)));}
  catch{return emptyState();}
}

let state=loadLocal();
let ui={tab:'week',weekOffset:0,editId:null,form:{name:'',dose:'',unit:'mg',days:[]}};
let sync={code:localStorage.getItem(CODE_KEY)||'',status:sessionStatus(),pushTimer:null,pollTimer:null};
function sessionStatus(){return localStorage.getItem(CODE_KEY)?'connecting':'nocode';}

/* ---------- persistence ---------- */
function save(){
  state.updatedAt=Date.now();
  try{localStorage.setItem(KEY,JSON.stringify(state));}catch{}
  schedulePush();
}
function schedulePush(){
  clearTimeout(sync.pushTimer);
  sync.pushTimer=setTimeout(pushRemote,800);
}
async function pushRemote(){
  if(!sync.code)return;
  try{
    const r=await fetch(API+'?k='+encodeURIComponent(sync.code),{method:'PUT',body:JSON.stringify(state)});
    if(!r.ok)throw 0;
    setSyncStatus('synced');
  }catch{setSyncStatus('offline');}
}
async function pullRemote(){
  if(!sync.code){setSyncStatus('nocode');return;}
  try{
    const r=await fetch(API+'?k='+encodeURIComponent(sync.code),{cache:'no-store'});
    if(!r.ok)throw 0;
    const remote=await r.json();
    if(remote&&remote.profiles){
      if((remote.updatedAt||0)>(state.updatedAt||0)){
        state=normalize(remote);
        try{localStorage.setItem(KEY,JSON.stringify(state));}catch{}
        render();
      }else if((state.updatedAt||0)>(remote.updatedAt||0)){
        pushRemote();
      }
    }else if(state.updatedAt){
      pushRemote();
    }
    setSyncStatus('synced');
  }catch{setSyncStatus('offline');}
}
function setSyncStatus(s){
  sync.status=s;
  const el=document.querySelector('.sync-chip');
  if(el)el.innerHTML=syncChipHTML();
}
function syncChipHTML(){
  const map={
    synced:['#1E7A3E','Synced'],
    connecting:['#A3803C','Connecting\u2026'],
    offline:['#B0602F','Offline \u2014 saved on this device'],
    nocode:['#A3803C','Sync not set up'],
  };
  const[c,t]=map[sync.status]||map.offline;
  return `<span class="dot-ind" style="background:${c}"></span>${t}`;
}
function startPolling(){
  clearInterval(sync.pollTimer);
  sync.pollTimer=setInterval(pullRemote,30000);
  document.addEventListener('visibilitychange',()=>{if(!document.hidden)pullRemote();});
}

/* ---------- date helpers ---------- */
const fmtISO=d=>{
  const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+day;
};
function mondayOf(d){const c=new Date(d);const dow=(c.getDay()+6)%7;c.setDate(c.getDate()-dow);c.setHours(0,0,0,0);return c;}
function addDays(d,n){const c=new Date(d);c.setDate(c.getDate()+n);return c;}
const pretty=iso=>{const[y,m,d]=iso.split('-').map(Number);return new Date(y,m-1,d).toLocaleDateString('en-US',{month:'short',day:'numeric'});};
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

const meta=()=>PROFILES.find(p=>p.id===state.active)||PROFILES[0];
const data=()=>state.profiles[state.active];

/* ---------- render ---------- */
function render(){
  const acc=meta().accent;
  const app=document.getElementById('app');
  app.innerHTML=`
    ${sync.code?'':codeBanner()}
    <div class="profile-bar" role="tablist" aria-label="Profiles">
      ${PROFILES.map(p=>`
        <button class="profile-tab ${state.active===p.id?'on':''}" role="tab" aria-selected="${state.active===p.id}"
          style="${state.active===p.id?`background:${p.accent};border-color:${p.accent}`:''}"
          onclick="switchProfile('${p.id}')">
          <span class="avatar" style="background:${state.active===p.id?'rgba(255,255,255,.25)':p.accent}">${p.label[0]}</span>${p.label}
        </button>`).join('')}
    </div>
    <header>
      <div>
        <div class="eyebrow" style="color:${acc}">${meta().label}'s dose &amp; weigh-in log</div>
        <h1>Peptide Tracker</h1>
      </div>
      <div class="sync-chip" aria-live="polite">${syncChipHTML()}</div>
    </header>
    <nav class="tabs" role="tablist">
      ${[['week','This week'],['weight','Weight'],['calc','Calculator'],['peptides','Peptides']].map(([id,l])=>`
        <button class="${ui.tab===id?'on':''}" role="tab" aria-selected="${ui.tab===id}" onclick="setTab('${id}')">${l}</button>`).join('')}
    </nav>
    <main>${ui.tab==='week'?weekView():ui.tab==='weight'?weightView():ui.tab==='calc'?calcView():pepView()}</main>
    <div class="footer-tools">
      <button class="ghost" style="color:${acc}" onclick="changeCode()">${sync.code?'Change household code':'Set household code'}</button>
      <button class="ghost" style="color:${acc}" onclick="exportData()">Export backup</button>
      <button class="ghost" style="color:${acc}" onclick="document.getElementById('importFile').click()">Import backup</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
    </div>`;
}

function codeBanner(){
  return `<div class="banner">
    <strong>Set up sync:</strong> enter a household code below (any private phrase, 4+ characters).
    Use the <em>same code</em> on both phones and your data stays in sync everywhere.
    <div class="form-row" style="margin-top:10px">
      <input id="codeInput" placeholder="Household code" style="flex:1 1 160px" aria-label="Household code"
        onkeydown="if(event.key==='Enter')saveCode()">
      <button class="primary" style="background:#177E89" onclick="saveCode()">Connect</button>
    </div>
  </div>`;
}
function saveCode(){
  const v=(document.getElementById('codeInput').value||'').trim();
  if(v.length<4){alert('Code needs at least 4 characters.');return;}
  sync.code=v;
  localStorage.setItem(CODE_KEY,v);
  setSyncStatus('connecting');
  render();
  pullRemote();
}
function changeCode(){
  const v=prompt('Household code (same on both phones):',sync.code||'');
  if(v===null)return;
  const t=v.trim();
  if(t.length<4){alert('Code needs at least 4 characters.');return;}
  sync.code=t;
  localStorage.setItem(CODE_KEY,t);
  setSyncStatus('connecting');
  pullRemote();
}

/* ---------- week ---------- */
function weekView(){
  const d=data(),acc=meta().accent;
  if(!d.peptides.length){
    return `<div class="empty"><p style="margin:0">No peptides set up for ${meta().label} yet.</p>
      <button class="primary" style="background:${acc}" onclick="setTab('peptides')">Add ${meta().label}'s first peptide</button></div>`;
  }
  const start=addDays(mondayOf(new Date()),ui.weekOffset*7);
  const dates=DAYS.map((_,i)=>addDays(start,i));
  const todayISO=fmtISO(new Date());
  const label=dates[0].toLocaleDateString('en-US',{month:'short',day:'numeric'})+' \u2013 '+dates[6].toLocaleDateString('en-US',{month:'short',day:'numeric'});
  return `
    <div class="week-nav">
      <button class="nav-btn" onclick="shiftWeek(-1)" aria-label="Previous week">\u2039</button>
      <div class="label">${label}</div>
      <button class="nav-btn" onclick="shiftWeek(1)" aria-label="Next week">\u203A</button>
    </div>
    <div class="center"><button class="ghost" style="color:${acc}" onclick="shiftWeek(0)">Jump to this week</button></div>
    <div class="grid-wrap">
      <div class="grid-row head">
        <div class="pep-cell"></div>
        ${dates.map((dt,i)=>`<div class="day-head ${fmtISO(dt)===todayISO?'today':''}" ${fmtISO(dt)===todayISO?`style="color:${acc}"`:''}><div>${DAYS[i]}</div><div class="num">${dt.getDate()}</div></div>`).join('')}
      </div>
      ${d.peptides.map(p=>{
        const taken=dates.filter(dt=>d.logs[fmtISO(dt)]&&d.logs[fmtISO(dt)][p.id]).length;
        return `<div class="grid-row">
          <div class="pep-cell"><span class="dot" style="background:${p.color}"></span>
            <div><div class="name">${esc(p.name)}</div><div class="sub">${p.dose} ${p.unit} \u00B7 ${taken}/${p.days.length} this week</div></div>
          </div>
          ${dates.map((dt,i)=>{
            const iso=fmtISO(dt);
            if(!p.days.includes(i))return `<div class="dose-cell"><span class="off-day">\u00B7</span></div>`;
            const on=!!(d.logs[iso]&&d.logs[iso][p.id]);
            return `<div class="dose-cell"><button class="cap" aria-label="${esc(p.name)} on ${DAYS[i]} ${iso}: ${on?'taken':'not taken'}"
              style="${on?`background:${p.color};border-color:${p.color};color:#FFF`:''}"
              onclick="toggleDose('${p.id}','${iso}')">\u2713</button></div>`;
          }).join('')}
        </div>`;
      }).join('')}
    </div>
    <div class="card">
      <div class="card-label">Weekly totals (taken / scheduled)</div>
      ${d.peptides.map(p=>{
        const taken=dates.filter(dt=>d.logs[fmtISO(dt)]&&d.logs[fmtISO(dt)][p.id]).length;
        return `<div class="row"><span><span class="dot" style="background:${p.color}"></span>${esc(p.name)}</span>
          <span class="mono">${(p.dose*taken).toLocaleString()} / ${(p.dose*p.days.length).toLocaleString()} ${p.unit}</span></div>`;
      }).join('')}
    </div>`;
}

/* ---------- weight ---------- */
function weightView(){
  const d=data(),acc=meta().accent;
  const sorted=[...d.weights].sort((a,b)=>a.date.localeCompare(b.date));
  const first=sorted[0],last=sorted[sorted.length-1],prev=sorted[sorted.length-2];
  const total=first&&last?last.weight-first.weight:null;
  const since=prev&&last?last.weight-prev.weight:null;
  const sign=v=>v>0?'+':'';
  const tone=v=>v==null?'#1C2B2D':v<0?'#1E7A3E':v>0?'#B0602F':'#1C2B2D';
  return `
    <div class="card">
      <div class="card-label">Log a weigh-in</div>
      <div class="form-row">
        <input type="date" id="wDate" value="${fmtISO(new Date())}" aria-label="Weigh-in date">
        <input type="number" inputmode="decimal" id="wVal" placeholder="Weight (lbs)" style="width:130px" aria-label="Weight in pounds"
          onkeydown="if(event.key==='Enter')addWeight()">
        <button class="primary" style="background:${acc}" onclick="addWeight()">Save</button>
      </div>
      <div class="hint">One entry per date \u2014 saving again on the same date replaces it.</div>
    </div>
    ${last?`<div class="stats">
      <div class="stat"><div class="lbl">Current</div><div class="val">${last.weight.toFixed(1)} lbs</div></div>
      <div class="stat"><div class="lbl">Since last weigh-in</div><div class="val" style="color:${tone(since)}">${since==null?'\u2014':sign(since)+since.toFixed(1)+' lbs'}</div></div>
      <div class="stat"><div class="lbl">Since first weigh-in</div><div class="val" style="color:${tone(total)}">${total==null?'\u2014':sign(total)+total.toFixed(1)+' lbs'}</div></div>
    </div>`:''}
    ${sorted.length>=2?`<div class="card"><div class="card-label">Progress</div>${chartSVG(sorted,acc,first.weight)}</div>`:''}
    ${sorted.length?`<div class="card"><div class="card-label">History</div>
      ${[...sorted].reverse().map(e=>`<div class="row"><span>${pretty(e.date)}, ${e.date.slice(0,4)}</span>
        <span style="display:flex;gap:10px;align-items:center"><span class="mono">${e.weight.toFixed(1)} lbs</span>
        <button class="delete" onclick="delWeight('${e.date}')" aria-label="Delete ${e.date}">\u2715</button></span></div>`).join('')}
      </div>`
      :`<div class="empty"><p style="margin:0">No weigh-ins yet \u2014 log the first one above.</p></div>`}`;
}

function chartSVG(sorted,acc,baseline){
  const W=700,H=240,padL=46,padR=14,padT=16,padB=30;
  const ws=sorted.map(e=>e.weight);
  let min=Math.min(...ws),max=Math.max(...ws);
  if(min===max){min-=2;max+=2;}
  const span=max-min;min-=span*.1;max+=span*.1;
  const x=i=>padL+(sorted.length===1?0:(i/(sorted.length-1))*(W-padL-padR));
  const y=w=>padT+(1-(w-min)/(max-min))*(H-padT-padB);
  const pts=sorted.map((e,i)=>`${x(i).toFixed(1)},${y(e.weight).toFixed(1)}`).join(' ');
  const ticks=4,tickEls=[];
  for(let t=0;t<=ticks;t++){
    const v=min+(t/ticks)*(max-min),yy=y(v);
    tickEls.push(`<line x1="${padL}" y1="${yy}" x2="${W-padR}" y2="${yy}" stroke="#E3E8E6" stroke-dasharray="3 3"/>
      <text x="${padL-6}" y="${yy+4}" text-anchor="end" font-size="11" fill="#5C6B6D">${v.toFixed(0)}</text>`);
  }
  const step=Math.max(1,Math.ceil(sorted.length/7));
  const xlabels=sorted.map((e,i)=>i%step===0||i===sorted.length-1
    ?`<text x="${x(i)}" y="${H-10}" text-anchor="middle" font-size="11" fill="#5C6B6D">${pretty(e.date)}</text>`:'').join('');
  const dots=sorted.map((e,i)=>`<circle cx="${x(i)}" cy="${y(e.weight)}" r="3.5" fill="${acc}"><title>${pretty(e.date)}: ${e.weight} lbs</title></circle>`).join('');
  return `<svg class="chart-svg" viewBox="0 0 ${W} ${H}" role="img" aria-label="Weight over time">
    ${tickEls.join('')}
    <line x1="${padL}" y1="${y(baseline)}" x2="${W-padR}" y2="${y(baseline)}" stroke="#B0602F" stroke-dasharray="4 4"/>
    <polyline points="${pts}" fill="none" stroke="${acc}" stroke-width="2.5"/>
    ${dots}${xlabels}
  </svg>`;
}

/* ---------- calculator ---------- */
function calcView(){
  const acc=meta().accent;
  const c=data().calc;
  const vial=parseFloat(c.vialMg),bac=parseFloat(c.bacMl);
  let dose=parseFloat(c.dose);
  const doseMg=c.doseUnit==='mcg'?dose/1000:dose;
  const ok=vial>0&&bac>0&&dose>0;
  let concMgMl=0,drawMl=0,units=0,perVial=0;
  if(vial>0&&bac>0){concMgMl=vial/bac;}
  if(ok){
    drawMl=doseMg/concMgMl;
    units=drawMl*100;
    perVial=vial/doseMg;
  }
  const fmt=(v,dp)=>Number.isFinite(v)?v.toLocaleString('en-US',{maximumFractionDigits:dp}):'\u2014';
  return `
    <div class="card">
      <div class="card-label">Reconstitution calculator</div>
      <div class="calc-grid">
        <div class="calc-field">
          <label for="cVial">Peptide in vial (mg)</label>
          <input id="cVial" type="number" inputmode="decimal" min="0" step="any" placeholder="e.g. 5"
            value="${esc(c.vialMg)}" oninput="setCalc('vialMg',this.value)">
        </div>
        <div class="calc-field">
          <label for="cBac">BAC water added (mL)</label>
          <input id="cBac" type="number" inputmode="decimal" min="0" step="any" placeholder="e.g. 2"
            value="${esc(c.bacMl)}" oninput="setCalc('bacMl',this.value)">
        </div>
        <div class="calc-field">
          <label for="cDose">Desired dose</label>
          <input id="cDose" type="number" inputmode="decimal" min="0" step="any" placeholder="e.g. 250"
            value="${esc(c.dose)}" oninput="setCalc('dose',this.value)">
        </div>
        <div class="calc-field">
          <label for="cUnit">Dose unit</label>
          <select id="cUnit" onchange="setCalc('doseUnit',this.value)">
            <option value="mcg" ${c.doseUnit==='mcg'?'selected':''}>mcg</option>
            <option value="mg" ${c.doseUnit==='mg'?'selected':''}>mg</option>
          </select>
        </div>
      </div>

      <div class="calc-result" style="margin-top:14px">
        <div class="card-label" style="margin-bottom:6px">Draw for one dose</div>
        <div class="big" style="color:${acc}">${ok?fmt(units,1)+' units':'\u2014'}</div>
        <div class="sub2">${ok?`on a U-100 insulin syringe \u2003=\u2003 ${fmt(drawMl,3)} mL`:'Fill in all three fields above.'}</div>
      </div>

      ${vial>0&&bac>0?`<div class="stats" style="margin-top:10px;margin-bottom:0">
        <div class="stat"><div class="lbl">Concentration</div><div class="val" style="font-size:18px">${fmt(concMgMl,3)} mg/mL</div>
          <div class="hint">${fmt(concMgMl*1000,0)} mcg/mL \u00B7 ${fmt(concMgMl*10,1)} mcg per unit</div></div>
        ${ok?`<div class="stat"><div class="lbl">Doses per vial</div><div class="val" style="font-size:18px">${fmt(Math.floor(perVial),0)}</div>
          <div class="hint">at ${esc(c.dose)} ${c.doseUnit} each</div></div>`:''}
      </div>`:''}
    </div>

    <div class="card">
      <div class="card-label">The formula</div>
      <div class="formula">concentration (mg/mL) = peptide in vial (mg) \u00F7 BAC water (mL)<br>
draw volume (mL) = desired dose (mg) \u00F7 concentration (mg/mL)<br>
syringe units (U-100) = draw volume (mL) \u00D7 100</div>
      <div class="hint" style="margin-top:10px">
        Example: a 5 mg vial mixed with 2 mL of BAC water gives 2.5 mg/mL. A 250 mcg (0.25 mg) dose is
        0.25 \u00F7 2.5 = 0.1 mL, which is 10 units on a U-100 insulin syringe.
      </div>
      <div class="hint" style="margin-top:6px">
        Tip: adding more BAC water makes the mix more dilute, so each dose is a larger, easier-to-measure draw \u2014
        the total peptide in the vial stays the same.
      </div>
    </div>`;
}
function setCalc(field,val){
  data().calc[field]=val;
  save();
  render();
  // keep focus on the field being typed in
  const map={vialMg:'cVial',bacMl:'cBac',dose:'cDose',doseUnit:'cUnit'};
  const el=document.getElementById(map[field]);
  if(el&&field!=='doseUnit'){el.focus();const v=el.value;el.value='';el.value=v;}
}

/* ---------- peptides ---------- */
function pepView(){
  const d=data(),acc=meta().accent,f=ui.form;
  const valid=f.name.trim()&&parseFloat(f.dose)>0&&f.days.length>0;
  return `
    <div class="card">
      <div class="card-label">${ui.editId?'Edit peptide':'Add a peptide'}</div>
      <div class="form-row">
        <input placeholder="Name (e.g. BPC-157)" value="${esc(f.name)}" style="flex:1 1 180px" aria-label="Peptide name"
          oninput="ui.form.name=this.value;refreshValidity()">
        <input type="number" inputmode="decimal" placeholder="Dose" value="${esc(f.dose)}" style="width:100px" aria-label="Dose amount"
          oninput="ui.form.dose=this.value;refreshValidity()">
        <select aria-label="Dose unit" onchange="ui.form.unit=this.value">
          ${UNITS.map(u=>`<option ${f.unit===u?'selected':''}>${u}</option>`).join('')}
        </select>
      </div>
      <div class="hint" style="margin:12px 0 4px">Which days?</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${DAYS.map((dl,i)=>`<button class="day-pill ${f.days.includes(i)?'on':''}" aria-pressed="${f.days.includes(i)}"
          style="${f.days.includes(i)?`background:${acc};border-color:${acc}`:''}" onclick="toggleFormDay(${i})">${dl}</button>`).join('')}
      </div>
      <div style="display:flex;gap:8px;margin-top:14px">
        <button id="pepSave" class="primary" style="background:${acc}" ${valid?'':'disabled'} onclick="savePeptide()">${ui.editId?'Save changes':'Add peptide'}</button>
        ${ui.editId?`<button class="ghost" style="color:${acc}" onclick="cancelEdit()">Cancel</button>`:''}
      </div>
    </div>
    ${d.peptides.length?`<div class="card"><div class="card-label">Current peptides</div>
      ${d.peptides.map(p=>`<div class="row">
        <span><span class="dot" style="background:${p.color}"></span><strong>${esc(p.name)}</strong>
          <span style="color:#5C6B6D;font-size:13px"> ${p.dose} ${p.unit} \u00B7 ${p.days.map(i=>DAYS[i]).join(', ')}</span></span>
        <span style="display:flex;gap:8px">
          <button class="ghost" style="color:${acc}" onclick="editPeptide('${p.id}')">Edit</button>
          <button class="delete" onclick="removePeptide('${p.id}')" aria-label="Delete ${esc(p.name)}">\u2715</button>
        </span></div>`).join('')}
      </div>`:''}`;
}

/* ---------- actions ---------- */
function switchProfile(id){state.active=id;save();render();}
function setTab(t){ui.tab=t;render();}
function shiftWeek(n){ui.weekOffset=n===0?0:ui.weekOffset+n;render();}
function toggleDose(pid,iso){
  const d=data();
  const day={...(d.logs[iso]||{})};
  if(day[pid])delete day[pid];else day[pid]=true;
  if(Object.keys(day).length)d.logs[iso]=day;else delete d.logs[iso];
  save();render();
}
function addWeight(){
  const d=data();
  const date=document.getElementById('wDate').value;
  const w=parseFloat(document.getElementById('wVal').value);
  if(!date||!w||w<=0)return;
  d.weights=d.weights.filter(e=>e.date!==date);
  d.weights.push({date,weight:w});
  save();render();
}
function delWeight(date){
  const d=data();
  d.weights=d.weights.filter(e=>e.date!==date);
  save();render();
}
function toggleFormDay(i){
  const f=ui.form;
  f.days=f.days.includes(i)?f.days.filter(x=>x!==i):[...f.days,i].sort();
  render();
}
function refreshValidity(){
  const f=ui.form;
  const btn=document.getElementById('pepSave');
  if(btn)btn.disabled=!(f.name.trim()&&parseFloat(f.dose)>0&&f.days.length>0);
}
function savePeptide(){
  const d=data(),f=ui.form,dose=parseFloat(f.dose);
  if(!f.name.trim()||!dose||dose<=0||!f.days.length)return;
  if(ui.editId){
    d.peptides=d.peptides.map(p=>p.id===ui.editId?{...p,name:f.name.trim(),dose,unit:f.unit,days:[...f.days]}:p);
  }else{
    d.peptides.push({id:'pep-'+Date.now(),name:f.name.trim(),dose,unit:f.unit,days:[...f.days],
      color:PEP_COLORS[d.peptides.length%PEP_COLORS.length]});
  }
  ui.form={name:'',dose:'',unit:'mg',days:[]};ui.editId=null;
  save();render();
}
function editPeptide(id){
  const p=data().peptides.find(x=>x.id===id);
  if(!p)return;
  ui.editId=id;ui.form={name:p.name,dose:String(p.dose),unit:p.unit,days:[...p.days]};
  render();
}
function cancelEdit(){ui.editId=null;ui.form={name:'',dose:'',unit:'mg',days:[]};render();}
function removePeptide(id){
  const d=data();
  d.peptides=d.peptides.filter(p=>p.id!==id);
  for(const iso of Object.keys(d.logs)){
    delete d.logs[iso][id];
    if(!Object.keys(d.logs[iso]).length)delete d.logs[iso];
  }
  if(ui.editId===id)cancelEdit();
  save();render();
}

/* ---------- backup / restore ---------- */
function exportData(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='peptide-tracker-backup-'+fmtISO(new Date())+'.json';
  a.click();
  URL.revokeObjectURL(a.href);
}
function importData(ev){
  const file=ev.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const raw=JSON.parse(reader.result);
      if(raw.profiles&&raw.active){
        state=normalize(raw);
        save();render();
        alert('Backup imported.');
      }else{alert("That file doesn't look like a tracker backup.");}
    }catch{alert("Couldn't read that file.");}
  };
  reader.readAsText(file);
  ev.target.value='';
}

render();
pullRemote();
startPolling();
</script>
